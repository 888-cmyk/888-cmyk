<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <title>学生详情</title>
    <style>
        body { font-family: system-ui; padding: 20px; background: #eef2f7; }
        .card { max-width: 500px; margin: 0 auto; background: white; border-radius: 32px; padding: 24px; }
        .avatar { width: 80px; height: 80px; border-radius: 40px; object-fit: cover; }
        .fallback { width: 80px; height: 80px; background: #2b5876; border-radius: 40px; display: flex; align-items: center; justify-content: center; color: white; font-size: 32px; }
    </style>
</head>
<body>
    <div id="detail" class="card">加载中...</div>
    <script>
        const id = new URLSearchParams(location.search).get('id');
        if (!id) document.getElementById('detail').innerHTML = '未指定学生ID';
        else {
            fetch('students.json')
                .then(res => res.json())
                .then(data => {
                    const s = data.find(s => s.id == id);
                    if (!s) { document.getElementById('detail').innerHTML = '未找到学生'; return; }
                    const avatarHtml = s.avatarUrl ? `< img class="avatar" src="${s.avatarUrl}" onerror="this.onerror=null; this.src='';">` : `<div class="fallback">${(s.avatarInitial || s.name.slice(0,2)).toUpperCase()}</div>`;
                    document.getElementById('detail').innerHTML = `
                        ${avatarHtml}
                        <h1>${s.name}</h1>
                        <p>学号：${s.id}</p >
                        <p>性别：${s.gender || '未知'}</p >
                        <p>籍贯：${s.hometown || ''}</p >
                        <p>专业：${s.major || ''}</p >
                        <p>高光时刻：${s.grades || '暂无'}</p >
                        <p>干部经历：${(s.activities || '无').replace(/\n/g, '；')}</p >
                    `;
                })
                .catch(e => { document.getElementById('detail').innerHTML = '数据加载失败'; console.error(e); });
        }
    </script>
</body>
</html>
