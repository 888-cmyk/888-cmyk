<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>学生画像 · 详情</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            background: linear-gradient(145deg, #f0f4fa 0%, #e6ecf5 100%);
            min-height: 100vh;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
        }
        .profile-card {
            max-width: 500px;
            width: 100%;
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(12px);
            border-radius: 32px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.08);
            overflow: hidden;
            padding: 24px 20px 30px;
            transition: all 0.2s ease;
        }
        .header {
            display: flex;
            align-items: center;
            gap: 18px;
            margin-bottom: 28px;
            flex-wrap: wrap;
        }
        .avatar {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #2b5876, #4e4376);
            border-radius: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 36px;
            font-weight: 600;
            color: white;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            border: 3px solid white;
        }
        .title-section h1 {
            font-size: 24px;
            font-weight: 700;
            background: linear-gradient(115deg, #1e2b4a, #2c3e6e);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 6px;
        }
        .badge {
            background: rgba(255,255,255,0.7);
            backdrop-filter: blur(4px);
            padding: 6px 14px;
            border-radius: 40px;
            font-size: 14px;
            font-weight: 600;
            color: #1e2b4a;
            display: inline-block;
        }
        .info-module {
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(8px);
            border-radius: 24px;
            padding: 18px;
            margin-bottom: 20px;
            border: 1px solid rgba(255,255,255,0.5);
        }
        .module-title {
            font-size: 18px;
            font-weight: 650;
            color: #162b40;
            margin-bottom: 14px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .module-title i {
            width: 32px;
            height: 32px;
            background: white;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #2b5f8a;
            font-size: 16px;
        }
        .info-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }
        .info-item {
            background: white;
            border-radius: 20px;
            padding: 12px;
            border: 1px solid #eef3fc;
        }
        .info-label {
            font-size: 12px;
            color: #64748b;
            margin-bottom: 4px;
        }
        .info-value {
            font-weight: 600;
            font-size: 15px;
            color: #0c1a2b;
            word-break: break-word;
        }
        .tag-cloud {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }
        .tag {
            background: white;
            padding: 8px 16px;
            border-radius: 40px;
            font-size: 14px;
            font-weight: 500;
            border: 1px solid #eef3fc;
            color: #1f2f47;
        }
        .promise-item {
            display: flex;
            gap: 14px;
            margin-bottom: 16px;
            background: white;
            padding: 14px 16px;
            border-radius: 22px;
            align-items: flex-start;
        }
        .promise-icon {
            width: 42px;
            height: 42px;
            background: #f0f7ff;
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #1f5090;
            font-size: 18px;
            flex-shrink: 0;
        }
        .promise-text {
            font-weight: 500;
            color: #11212e;
            font-size: 14px;
            line-height: 1.4;
            flex: 1;
        }
        hr {
            margin: 24px 0 18px;
            border: none;
            height: 2px;
            background: linear-gradient(to right, #ffffff, #b3c7e0, #ffffff);
        }
        .footer-note {
            text-align: center;
            font-size: 13px;
            color: #6b7a90;
        }
        @media (max-width: 480px) {
            body { padding: 12px; }
            .profile-card { padding: 18px; }
            .avatar { width: 65px; height: 65px; font-size: 30px; border-radius: 26px; }
            .title-section h1 { font-size: 20px; }
            .info-grid { gap: 8px; }
            .info-item { padding: 10px; }
            .tag { padding: 6px 14px; font-size: 13px; }
        }
        @media (min-width: 768px) {
            .profile-card { max-width: 800px; padding: 32px 36px 40px; border-radius: 48px; }
            .avatar { width: 100px; height: 100px; font-size: 48px; border-radius: 36px; }
            .title-section h1 { font-size: 34px; }
            .info-module { padding: 24px; margin-bottom: 24px; border-radius: 32px; }
            .module-title { font-size: 22px; margin-bottom: 18px; }
            .info-item { padding: 16px; }
            .info-value { font-size: 16px; }
            .tag { padding: 10px 20px; font-size: 16px; }
            .promise-item { padding: 18px; gap: 18px; }
            .promise-text { font-size: 16px; }
        }
    </style>
</head>
<body>
    <div class="profile-card" id="profileCard">
        <div style="text-align: center; padding: 40px;">加载中...</div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const studentId = urlParams.get('id');

        function escapeText(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }

        if (!studentId) {
            document.getElementById('profileCard').innerHTML = '<div style="text-align:center; padding:40px;">未指定学生ID</div>';
        } else {
            fetch('students.json')
                .then(res => {
                    if (!res.ok) throw new Error('无法加载数据');
                    return res.json();
                })
                .then(data => {
                    const student = data.find(s => s.id == studentId);
                    if (!student) {
                        document.getElementById('profileCard').innerHTML = '<div style="text-align:center; padding:40px;">未找到该学生信息</div>';
                        return;
                    }

                    // 处理兴趣爱好（字符串转数组）
                    let interestArray = [];
                    if (student.interests) {
                        if (Array.isArray(student.interests)) interestArray = student.interests;
                        else interestArray = student.interests.split(',').map(s => s.trim()).filter(s => s);
                    }
                    
                    // 处理学生干部经历中的换行符
                    const activitiesText = (student.activities || '无').replace(/\n/g, '；').replace(/\r/g, '');
                    
                    // 头像字母（优先使用 avatarInitial，否则取姓名前两个字符大写）
                    const avatarLetter = student.avatarInitial ? student.avatarInitial : student.name.substring(0,2).toUpperCase();
                    
                    const html = `
                        <div class="header">
                            <div class="avatar">${escapeText(avatarLetter)}</div>
                            <div class="title-section">
                                <h1>${escapeText(student.name)} · 个人画像</h1>
                                <span class="badge"><i class="fas fa-graduation-cap"></i> ${escapeText(student.major || '管理学院B部')}</span>
                            </div>
                        </div>

                        <div class="info-module">
                            <div class="module-title"><i class="fas fa-user-circle"></i> 基本信息</div>
                            <div class="info-grid">
                                <div class="info-item"><div class="info-label">学号</div><div class="info-value">${escapeText(student.id || '')}</div></div>
                                <div class="info-item"><div class="info-label">性别</div><div class="info-value">${escapeText(student.gender || '未知')}</div></div>
                                <div class="info-item"><div class="info-label">籍贯</div><div class="info-value">${escapeText(student.hometown || '')}</div></div>
                                <div class="info-item"><div class="info-label">政治面貌</div><div class="info-value">${escapeText(student.politicalStatus || '群众')}</div></div>
                                <div class="info-item"><div class="info-label">宿舍号</div><div class="info-value">${escapeText(student.dormitory || '未知')}</div></div>
                                ${student.contact ? `<div class="info-item"><div class="info-label">联系电话</div><div class="info-value">${escapeText(student.contact)}</div></div>` : ''}
                            </div>
                        </div>

                        <div class="info-module">
                            <div class="module-title"><i class="fas fa-heart"></i> 兴趣爱好</div>
                            <div class="tag-cloud">
                                ${interestArray.map(i => `<span class="tag">${escapeText(i)}</span>`).join('') || '<span class="tag">暂无</span>'}
                            </div>
                        </div>

                        <div class="info-module">
                            <div class="module-title"><i class="fas fa-chart-line"></i> 在校状况</div>
                            <div class="promise-item">
                                <div class="promise-icon"><i class="fas fa-star"></i></div>
                                <div class="promise-text"><strong>✨ 高光时刻</strong><br>${escapeText(student.grades || '暂无')}</div>
                            </div>
                            <div class="promise-item">
                                <div class="promise-icon"><i class="fas fa-users"></i></div>
                                <div class="promise-text"><strong>📋 学生干部经历</strong><br>${escapeText(activitiesText)}</div>
                            </div>
                        </div>

                        <hr>
                        <div class="footer-note">
                            <i class="fas fa-mobile-alt"></i> 个人画像 · 数据实时更新
                        </div>
                    `;
                    document.getElementById('profileCard').innerHTML = html;
                })
                .catch(err => {
                    console.error(err);
                    document.getElementById('profileCard').innerHTML = '<div style="text-align:center; padding:40px;">数据加载失败，请检查网络或稍后重试</div>';
                });
        }
    </script>
</body>
</html>
