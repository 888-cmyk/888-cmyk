<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <title>管理学院B部 · 学生画像导航</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: system-ui; }
        body { background: #eef2f7; padding: 20px; }
        .container { max-width: 1200px; margin: 0 auto; }
        h1 { text-align: center; margin-bottom: 20px; color: #1e2b4a; }
        .stats { background: white; border-radius: 24px; padding: 15px; margin-bottom: 20px; display: flex; justify-content: space-around; }
        .stat-number { font-size: 28px; font-weight: bold; color: #2b5f8a; }
        .filter-bar { display: flex; gap: 10px; justify-content: center; margin-bottom: 20px; flex-wrap: wrap; }
        .filter-btn { background: white; border: none; padding: 8px 20px; border-radius: 40px; cursor: pointer; }
        .filter-btn.active { background: #2b5f8a; color: white; }
        .search-box { background: white; border-radius: 60px; padding: 10px 20px; margin-bottom: 20px; }
        .search-box input { width: 100%; border: none; outline: none; font-size: 16px; }
        .student-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }
        .student-card { background: white; border-radius: 24px; padding: 20px; cursor: pointer; transition: 0.2s; }
        .student-card:hover { transform: translateY(-4px); box-shadow: 0 8px 20px rgba(0,0,0,0.1); }
        .card-avatar { width: 50px; height: 50px; border-radius: 20px; object-fit: cover; margin-bottom: 15px; }
        .card-avatar-fallback { width: 50px; height: 50px; background: #2b5876; border-radius: 20px; display: flex; align-items: center; justify-content: center; color: white; font-size: 20px; }
        .student-card h3 { font-size: 18px; margin-bottom: 5px; }
        .student-card p { font-size: 13px; color: #666; margin-bottom: 5px; }
        .major-tag { display: inline-block; background: #e8f0fe; padding: 4px 12px; border-radius: 20px; font-size: 12px; color: #2b5f8a; margin-top: 8px; }
        .no-result { text-align: center; padding: 40px; color: #666; }
        footer { text-align: center; margin-top: 40px; color: #8aa0bc; }
    </style>
</head>
<body>
<div class="container">
    <h1>📊 管理学院B部 · 学生画像导航</h1>
    <div class="stats">
        <div><div class="stat-number" id="totalCount">0</div><div>总人数</div></div>
        <div><div class="stat-number" id="visibleCount">0</div><div>当前显示</div></div>
    </div>
    <div class="filter-bar" id="filterBar">
        <button class="filter-btn active" data-major="all">全部</button>
        <button class="filter-btn" data-major="工商管理">工商管理</button>
        <button class="filter-btn" data-major="电子商务">电子商务</button>
        <button class="filter-btn" data-major="信息管理与信息系统">信息管理与信息系统</button>
    </div>
    <div class="search-box">
        <input type="text" id="searchInput" placeholder="🔍 按姓名、学号、专业或地区搜索...">
    </div>
    <div class="student-grid" id="studentGrid">加载中...</div>
    <footer>数据来源：学院档案 | 每学期更新</footer>
</div>
<script>
    let studentsData = [];
    let currentMajor = 'all';

    async function loadData() {
        try {
            const res = await fetch('students.json');
            const data = await res.json();
            studentsData = data;
            renderStudents();
        } catch(e) {
            document.getElementById('studentGrid').innerHTML = '<div class="no-result">数据加载失败</div>';
            console.error(e);
        }
    }

    function renderStudents() {
        const searchTerm = document.getElementById('searchInput').value.toLowerCase();
        let filtered = studentsData;
        if (currentMajor !== 'all') {
            filtered = filtered.filter(s => s.major === currentMajor);
        }
        if (searchTerm) {
            filtered = filtered.filter(s =>
                (s.name && s.name.toLowerCase().includes(searchTerm)) ||
                (s.id && s.id.includes(searchTerm)) ||
                (s.major && s.major.toLowerCase().includes(searchTerm)) ||
                (s.hometown && s.hometown.toLowerCase().includes(searchTerm))
            );
        }
        document.getElementById('totalCount').innerText = studentsData.length;
        document.getElementById('visibleCount').innerText = filtered.length;
        const grid = document.getElementById('studentGrid');
        if (!filtered.length) {
            grid.innerHTML = '<div class="no-result">😢 没有找到符合条件的同学</div>';
            return;
        }
        let html = '';
        for (let s of filtered) {
            // 注意：这里用单引号包裹字符串，避免双引号冲
            let avatarHtml = '';
            if (s.avatarUrl) {
                avatarHtml = `< img class="card-avatar" src="${s.avatarUrl}" onerror="this.onerror=null; this.src='';">`;
            } else {
                avatarHtml = `<div class="card-avatar-fallback">${(s.avatarInitial || s.name.slice(0,2)).toUpperCase()}</div>`;
            }
            html += `
                <div class="student-card" onclick="location.href='student.html?id=${encodeURIComponent(s.id)}'">
                    ${avatarHtml}
                    <h3>${escapeHtml(s.name)}</h3>
                    <p>📚 ${escapeHtml(s.id)}</p >
                    <p>📍 ${escapeHtml(s.hometown || '未知')}</p >
                    <div class="major-tag">${escapeHtml(s.major || '专业未填')}</div>
                </div>
            `;
        }
        grid.innerHTML = html;
    }

    // 简单的防XSS函数（顺便也能避免标签被转义）
    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    document.querySelectorAll('.filter-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            currentMajor = btn.getAttribute('data-major');
            renderStudents();
        });
    });
    document.getElementById('searchInput').addEventListener('input', () => renderStudents());
    loadData();
</script>
</body>
</html>
